syntax = "proto3";

package gateway.v1;

option go_package = "github.com/xuzixiang/tiny-llm-serving-gateway/gen/gateway/v1;gatewayv1";

message Message {
  string role = 1;
  string content = 2;
}

message Usage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
}

message Embedding {
  int32 index = 1;
  repeated float vector = 2;
}

syntax = "proto3";

package gateway.v1;

import "gateway/v1/gateway.proto";

option go_package = "github.com/xuzixiang/tiny-llm-serving-gateway/gen/gateway/v1;gatewayv1";

service GatewayService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);
  rpc Embed(EmbedRequest) returns (EmbedResponse);
}

message ChatRequest {
  string model = 1;
  repeated Message messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
}

message ChatResponse {
  string id = 1;
  string model = 2;
  string content = 3;
  Usage usage = 4;
}

message ChatChunk {
  string id = 1;
  string delta = 2;
  bool done = 3;
}

message EmbedRequest {
  string model = 1;
  repeated string input = 2;
}

message EmbedResponse {
  string model = 1;
  repeated Embedding embeddings = 2;
  int32 prompt_tokens = 3;
  int32 total_tokens = 4;
}
